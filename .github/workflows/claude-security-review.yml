# Location: .github/workflows/claude-security-review.yml
# Summary: Claude Code security review for pull requests
# Description: Runs Claude Code to review PRs for security vulnerabilities, logic errors,
#              and code quality issues. Also responds to @claude mentions in PR comments.
# Related: .github/workflows/ci.yml, CLAUDE.md

name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security-review:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request with a security-first mindset for the orynq-sdk project.

            Focus on:
            - Security vulnerabilities (injection, XSS, SSRF, path traversal, etc.)
            - Cryptographic misuse or weak hash/signing patterns
            - Secrets or credentials accidentally committed
            - Unsafe deserialization or input validation gaps
            - Dependency-related risks
            - Logic errors that could lead to data corruption or loss

            This is a TypeScript/Python SDK with cryptographic operations, blob storage,
            and anchor workers. Pay special attention to:
            - packages/ directory for SDK core logic
            - services/ directory for backend services
            - Any changes to k8s configs or deployment files

            Post findings as inline review comments on the relevant lines.
          claude_args: "--max-turns 5"
