name: Claude Security Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  security-review:
    # Run on PR events, manual dispatch, or @claude mentions in comments
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ steps.pr.outputs.number }} > /tmp/pr.diff 2>/dev/null || true
          echo "diff_size=$(wc -c < /tmp/pr.diff)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Security Review
        if: steps.diff.outputs.diff_size != '0'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are a security reviewer for the Orynq SDK monorepo. This is a TypeScript/Node.js
            monorepo with packages for cryptographic process tracing, Cardano blockchain anchoring,
            zero-knowledge proofs, and AI safety monitoring.

            Review this PR for security issues. Focus on:

            1. **Cryptographic safety** — hash function misuse, weak randomness, missing domain separation,
               timing side-channels in comparisons
            2. **Input validation** — unsanitized user input, injection vectors, missing bounds checks
            3. **Key/secret handling** — hardcoded secrets, keys in logs, improper key storage
            4. **Blockchain safety** — metadata manipulation, transaction replay, anchor integrity
            5. **Dependency risks** — known vulnerable deps, supply chain concerns
            6. **TypeScript specifics** — unsafe type assertions, prototype pollution, path traversal
            7. **AI safety** — if touching safety-monitor/channel-firewall/eval-awareness code, check for
               bypass vectors, false-negative blind spots, and monitor evasion techniques

            For each issue found:
            - Classify severity: CRITICAL / HIGH / MEDIUM / LOW / INFO
            - Reference the specific file and line
            - Explain the attack scenario
            - Suggest a fix

            If no significant issues are found, say so clearly. Do not invent problems.
          timeout_minutes: 30
