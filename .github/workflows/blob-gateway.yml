name: Build and push blob-gateway image

on:
  push:
    branches: [main]
    paths:
      - 'services/blob-gateway/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/blob-gateway.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/flux-point-studios/blob-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # Don't pin a `version:` here — pnpm/action-setup auto-reads
        # `packageManager` from package.json (currently pnpm@8.14.0).
        # Setting `version:` AND `packageManager:` errors with
        # ERR_PNPM_BAD_PM_VERSION ("Multiple versions of pnpm specified").

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript (populates services/blob-gateway/dist/)
        run: pnpm --filter @orynq/blob-gateway build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        working-directory: services/blob-gateway
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
